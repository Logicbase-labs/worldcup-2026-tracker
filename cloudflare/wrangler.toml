name = "worldcup-2026-api"
main = "worker.js"
compatibility_date = "2024-11-01"

# Public, non-secret values.
[vars]
VAPID_PUBLIC = "BB50_RHiHBawxjgCCthJyEZn1stDe9snvx8ta0Nk6oFkTYqF2zL6yvhUNMwb_PbfgRx3_IBvVU2tdumDOtwsme0"
VAPID_SUBJECT = "mailto:info@musenailandspa.com"

# Push subscriptions + last-seen match state.
# id is filled in after: wrangler kv namespace create SUBS
[[kv_namespaces]]
binding = "SUBS"
id = "REPLACE_WITH_KV_ID"

# Every-minute watcher that turns live-feed changes into push alerts.
[triggers]
crons = ["* * * * *"]

